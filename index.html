<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-API Validator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { background-color: #4f46e5; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        .inactive-tab { background-color: #334155; color: #94a3b8; }
        .inactive-tab:hover { background-color: #475569; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
        <div class="p-6 border-b border-slate-700 bg-slate-800/50 text-center">
            <h2 class="text-2xl font-bold bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">
                API Key Checker
            </h2>
        </div>

        <div class="flex p-2 gap-2 bg-slate-900/50">
            <button onclick="setProvider('groq')" id="btn-groq" class="flex-1 py-2 rounded-xl transition-all font-medium active-tab">Groq</button>
            <button onclick="setProvider('gemini')" id="btn-gemini" class="flex-1 py-2 rounded-xl transition-all font-medium inactive-tab">Gemini</button>
        </div>

        <div class="p-8 space-y-6">
            <div>
                <div class="flex justify-between mb-2">
                    <label class="text-sm font-medium" id="key-label">Ваш Groq API Ключ:</label>
                    <a id="get-key-link" href="https://console.groq.com/keys" target="_blank" class="text-xs text-indigo-400 hover:underline">Получить ключ →</a>
                </div>
                <input type="password" id="apiKey" 
                    class="w-full p-3 bg-slate-900 rounded-lg border border-slate-600 focus:ring-2 focus:ring-indigo-500 outline-none transition-all"
                    placeholder="gsk_...">
            </div>

            <button onclick="checkKey()" id="btn-check"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition-colors shadow-lg shadow-indigo-500/20">
                Проверить ключ
            </button>

            <div id="status" class="hidden p-4 rounded-lg text-sm break-words border"></div>
        </div>
    </div>

    <script>
        let currentProvider = 'groq';

        // Логика переключения вкладок
        function setProvider(provider) {
            currentProvider = provider;
            
            const btnGroq = document.getElementById('btn-groq');
            const btnGemini = document.getElementById('btn-gemini');
            const keyLabel = document.getElementById('key-label');
            const inputField = document.getElementById('apiKey');
            const getLink = document.getElementById('get-key-link');
            const statusDiv = document.getElementById('status');

            // Очищаем статус и поле
            statusDiv.classList.add('hidden');
            inputField.value = '';

            if (provider === 'groq') {
                btnGroq.className = 'flex-1 py-2 rounded-xl transition-all font-medium active-tab';
                btnGemini.className = 'flex-1 py-2 rounded-xl transition-all font-medium inactive-tab';
                keyLabel.innerText = 'Ваш Groq API Ключ:';
                inputField.placeholder = 'gsk_...';
                getLink.href = 'https://console.groq.com/keys';
            } else {
                btnGemini.className = 'flex-1 py-2 rounded-xl transition-all font-medium active-tab';
                btnGroq.className = 'flex-1 py-2 rounded-xl transition-all font-medium inactive-tab';
                keyLabel.innerText = 'Ваш Gemini API Ключ:';
                inputField.placeholder = 'AIza...';
                getLink.href = 'https://aistudio.google.com/app/apikey';
            }
        }

        // Основная функция проверки
        async function checkKey() {
            const key = document.getElementById('apiKey').value.trim();
            const btnCheck = document.getElementById('btn-check');

            if (!key) {
                showStatus("⚠️ Пожалуйста, введите ключ!", "error");
                return;
            }

            btnCheck.disabled = true;
            btnCheck.innerText = "Проверяю...";
            
            try {
                if (currentProvider === 'groq') {
                    await checkGroq(key);
                } else {
                    await checkGemini(key);
                }
            } catch (err) {
                showStatus(`⚠️ Ошибка сети или CORS: ${err.message}`, "error");
            } finally {
                btnCheck.disabled = false;
                btnCheck.innerText = "Проверить ключ";
            }
        }

        // Запрос к Groq
        async function checkGroq(key) {
            const response = await fetch('https://api.groq.com/openai/v1/models', {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${key}`,
                    'Content-Type': 'application/json'
                }
            });
            const data = await response.json();

            if (response.ok) {
                const models = data.data.slice(0, 3).map(m => m.id).join(', ');
                showStatus(`✅ <b>Groq ключ активен!</b><br>Доступные модели: <span class="text-indigo-300">${models}</span>...`, "success");
            } else {
                showStatus(`❌ Ошибка: ${data.error?.message || 'Неверный ключ'}`, "error");
            }
        }

        // Запрос к Gemini
        async function checkGemini(key) {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`, {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' }
            });
            const data = await response.json();

            if (response.ok) {
                // Gemini возвращает список в объекте data.models
                const models = data.models.filter(m => m.name.includes('gemini')).slice(0, 3).map(m => m.displayName).join(', ');
                showStatus(`✅ <b>Gemini ключ активен!</b><br>Доступные модели: <span class="text-indigo-300">${models}</span>...`, "success");
            } else {
                showStatus(`❌ Ошибка: ${data.error?.message || 'Неверный ключ'}`, "error");
            }
        }

        // Отрисовка статуса
        function showStatus(text, type) {
            const statusDiv = document.getElementById('status');
            statusDiv.classList.remove('hidden', 'bg-red-900/30', 'border-red-500', 'text-red-200', 'bg-green-900/30', 'border-green-500', 'text-green-200');
            
            if (type === "success") {
                statusDiv.classList.add('bg-green-900/30', 'border-green-500', 'text-green-200');
            } else {
                statusDiv.classList.add('bg-red-900/30', 'border-red-500', 'text-red-200');
            }
            
            statusDiv.innerHTML = text;
        }
    </script>
</body>
</html>
